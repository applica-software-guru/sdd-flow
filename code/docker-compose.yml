services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: sddflow
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-sdd-flow-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017/sddflow}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
      APP_DOMAIN: ${APP_DOMAIN:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ENABLE_GOOGLE_OAUTH: ${ENABLE_GOOGLE_OAUTH:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-brevo}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-SDD Flow}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME:-}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD:-}
      MAIL_SMTP_USE_TLS: ${MAIL_SMTP_USE_TLS:-true}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    image: ${FRONTEND_IMAGE:-sdd-flow-frontend:local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8000}
      PUBLIC_APP_DOMAIN: ${PUBLIC_APP_DOMAIN:-}
    depends_on:
      - backend

volumes:
  mongo_data:
