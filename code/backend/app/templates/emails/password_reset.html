{% extends "emails/base.html" %}

{% block body %}
<p style="margin:0 0 12px 0;font-size:15px;line-height:1.65;color:#334155;">
	Hello {{ display_name }},
</p>
<p style="margin:0 0 12px 0;font-size:15px;line-height:1.65;color:#334155;">
	We received a request to reset your SDD Flow password.
</p>
<p style="margin:0 0 12px 0;font-size:14px;line-height:1.6;color:#475569;">
	For your security, this link expires in <strong>{{ expires_minutes }} minutes</strong>.
</p>
<p style="margin:0;font-size:14px;line-height:1.6;color:#475569;">
	If you did not request this change, you can safely ignore this email.
</p>
{% endblock %}
