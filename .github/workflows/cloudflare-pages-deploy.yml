name: cloudflare-pages-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - code/frontend/**
      - .github/workflows/cloudflare-pages-deploy.yml

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'sdd-flow' }}
  BACKEND_ORIGIN: ${{ vars.BACKEND_ORIGIN || 'https://sdd-flow-backend-i2oevdkzpq-ew.a.run.app' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: code/frontend
        run: npm ci

      - name: Build frontend
        working-directory: code/frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          BACKEND_ORIGIN: ${{ vars.BACKEND_ORIGIN || 'https://sdd-flow-backend-i2oevdkzpq-ew.a.run.app' }}
        run: npm run build

      - name: Generate Pages edge proxy worker
        working-directory: code/frontend
        env:
          BACKEND_ORIGIN: ${{ vars.BACKEND_ORIGIN || 'https://sdd-flow-backend-i2oevdkzpq-ew.a.run.app' }}
        run: |
          cat > dist/_worker.js <<'EOF'
          export default {
            async fetch(request, env) {
              const url = new URL(request.url);
              if (url.pathname.startsWith('/api/') || url.pathname.startsWith('/auth/')) {
                const upstream = new URL(url.pathname + url.search, '__BACKEND_ORIGIN__');
                return fetch(new Request(upstream.toString(), request));
              }
              return env.ASSETS.fetch(request);
            },
          };
          EOF
          sed -i.bak "s|__BACKEND_ORIGIN__|${BACKEND_ORIGIN}|g" dist/_worker.js
          rm -f dist/_worker.js.bak

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy code/frontend/dist
            --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }}
            --branch=main
