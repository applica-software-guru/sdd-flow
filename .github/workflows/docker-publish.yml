name: docker-publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Manual tag override
        required: false
        default: ""
      push_images:
        description: Push images to registry
        type: boolean
        required: false
        default: true
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  GAR_LOCATION: ${{ vars.GAR_LOCATION || 'europe-west1' }}
  REGISTRY: ${{ format('{0}-docker.pkg.dev', vars.GAR_LOCATION || 'europe-west1') }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'sdd-flow' }}
  IMAGE_NAME_BACKEND: ${{ vars.IMAGE_NAME_BACKEND || 'sdd-flow-backend' }}
  IMAGE_NAME_FRONTEND: ${{ vars.IMAGE_NAME_FRONTEND || 'sdd-flow-frontend' }}

jobs:
  validate-config-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate runtime config templates exist
        run: |
          test -f code/backend/.env.example
          test -f code/frontend/.env.example
          test -f code/deploy/env.template

      - name: Validate required backend runtime keys
        run: |
          for key in MONGODB_URL JWT_SECRET FRONTEND_URL; do
            grep -q "^${key}=" code/backend/.env.example
          done

      - name: Validate required frontend runtime keys
        run: |
          for key in NGINX_SERVER_NAME BACKEND_UPSTREAM; do
            grep -q "^${key}=" code/frontend/.env.example
          done

  build-and-publish:
    runs-on: ubuntu-latest
    needs: validate-config-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false')
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false')
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        if: github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false')
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Compute canonical version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          manual_tag="${{ github.event.inputs.image_tag || '' }}"
          ref_type="${GITHUB_REF_TYPE}"
          ref_name="${GITHUB_REF_NAME}"

          if [[ -n "${manual_tag}" ]]; then
            version="${manual_tag}"
          elif [[ "${ref_type}" == "tag" && "${ref_name}" == v* ]]; then
            version="${ref_name}"
          else
            version="rev-${short_sha}"
          fi

          emit_latest="false"
          if [[ "${ref_type}" == "tag" && "${ref_name}" == v* ]]; then
            emit_latest="true"
          fi

          if [[ -n "${manual_tag}" && "${ref_type}" == "tag" && "${ref_name}" == v* && "${manual_tag}" != "${ref_name}" ]]; then
            echo "Manual image_tag (${manual_tag}) must match git tag (${ref_name}) on release-tag events." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "emit_latest=${emit_latest}" >> "$GITHUB_OUTPUT"

      - name: Show publish version
        run: |
          echo "VERSION=${{ steps.version.outputs.version }}"
          echo "EMIT_LATEST=${{ steps.version.outputs.emit_latest }}"

      - name: Backend metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.emit_latest == 'true' }}

      - name: Frontend metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.emit_latest == 'true' }}

      - name: Verify backend/frontend version alignment
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          backend_tags="${{ steps.backend_meta.outputs.tags }}"
          frontend_tags="${{ steps.frontend_meta.outputs.tags }}"

          if ! grep -q ":${version}$" <<< "${backend_tags}"; then
            echo "Backend tags do not include canonical version ${version}" >&2
            exit 1
          fi

          if ! grep -q ":${version}$" <<< "${frontend_tags}"; then
            echo "Frontend tags do not include canonical version ${version}" >&2
            exit 1
          fi

          echo "Version alignment check passed for ${version}."

      - name: Publish image summary
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          backend_image="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME_BACKEND }}:${version}"
          frontend_image="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME_FRONTEND }}:${version}"

          {
            echo "## Docker Publish Summary"
            echo
            echo "- Version: ${version}"
            echo "- Backend image: ${backend_image}"
            echo "- Frontend image: ${frontend_image}"
            echo
            echo "### Pull commands"
            echo
            echo "\`\`\`bash"
            echo "docker pull ${backend_image}"
            echo "docker pull ${frontend_image}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and optionally push backend image
        uses: docker/build-push-action@v6
        with:
          context: code/backend
          file: code/backend/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and optionally push frontend image
        uses: docker/build-push-action@v6
        with:
          context: code/frontend
          file: code/frontend/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
